[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "I",    # isort
    "N",    # pep8-naming
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "C4",   # flake8-comprehensions
    "NPY",  # numpy-specific rules
    "RUF",  # ruff-specific rules
]

ignore = [
    "N803",  # argument name should be lowercase (S0, K, T are math notation)
    "N806",  # variable in function should be lowercase
]

[tool.ruff.format]
indent-style = "space"
quote-style = "double"
docstring-code-format = true